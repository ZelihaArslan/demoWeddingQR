<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Düğün Albümümüz</title>
    <!-- JSZip kütüphanesini ekliyoruz (Ücretsiz toplu zip indirme için) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcfc;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #e88fae;
            font-size: 2.5em;
            margin-bottom: 30px;
            @media (max-width: 600px) {
                font-size: 1.8em;
            }
        }
        .container {
             max-width: 1200px;
             margin: 0 auto;
             padding: 0 15px;
        }
        .upload-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 500px;
            margin: 0 auto 30px auto;
        }
        input[type="file"] {
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn {
            background-color: #e88fae;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
            margin: 5px;
        }
        .btn:hover {
            background-color: #d17594;
        }
        .btn-download-all {
            background-color: #ff9800;
            margin-bottom: 20px;
        }
        .btn-download-all:hover {
            background-color: #f57c00;
        }
        .message {
            margin-top: 15px;
            color: #28a745;
            font-weight: bold;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        .gallery-item {
            width: 100%;
            height: 300px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .media-container {
            width: 100%;
            height: 80%;
            overflow: hidden;
        }
        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .gallery-item video {
             object-fit: contain;
             background-color: black;
        }
        .gallery-item img:hover {
            transform: scale(1.05);
        }
        .download-btn-container {
             width: 100%;
             height: 20%;
             background-color: white;
             display: flex;
             align-items: center;
             justify-content: center;
             border-top: 1px solid #eee;
        }
        .btn-download-single {
             background-color: #4CAF50;
             color: white;
             border: none;
             padding: 8px 16px;
             border-radius: 4px;
             cursor: pointer;
             font-size: 14px;
             font-weight: bold;
             text-decoration: none;
        }
        .btn-download-single:hover {
            background-color: #45a049;
        }

        /* Yükleme animasyonu için */
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #e88fae;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <h2 id="loading-text">Tüm dosyalar toplanıyor... Lütfen bekleyin.</h2>
    <p id="loading-progress">0 / 0</p>
</div>

<div class="container">
    <h1>💍 Düğün Albümümüze Hoş Geldiniz! 🤍</h1>

    <div class="upload-container">
        <h2>Anılarınızı Bizimle Paylaşın</h2>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="files" accept="image/*,video/*" required multiple>
            <br>
            <button type="submit" class="btn">Yükle</button>
        </form>

        <div th:if="${message}" class="message">
            <p th:text="${message}"></p>
        </div>
    </div>

    <!-- Ücretsiz Toplu İndirme Butonu -->
    <button class="btn btn-download-all" onclick="downloadAllAsZip()">Tüm Arşivi İndir (ZIP)</button>

    <div class="gallery">
        <div class="gallery-item" th:each="media : ${mediaList}">

            <div class="media-container">
                <!-- Javascript'in linkleri bulabilmesi için data-url attribute'u ekliyoruz -->
                <img th:if="${media.resource_type == 'image'}" th:src="${media.url}" class="media-file" th:data-url="${media.url}" alt="Düğün Fotoğrafı" loading="lazy">
                <video th:if="${media.resource_type == 'video'}" th:src="${media.url}" class="media-file" th:data-url="${media.url}" controls preload="metadata"></video>
            </div>

            <div class="download-btn-container">
                 <button class="btn-download-single" th:attr="onclick=|downloadMedia('${media.url}')|">İndir</button>
            </div>

        </div>
    </div>
</div>

<script>
    // Tekli indirme fonksiyonu (Aynı kalıyor)
    async function downloadMedia(url) {
        try {
            const urlParts = url.split('/');
            const filename = urlParts[urlParts.length - 1] || 'dugun_hatirasi.jpg';

            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);

            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = filename;

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            window.URL.revokeObjectURL(blobUrl);
        } catch (error) {
            console.error('İndirme hatası:', error);
            alert('Dosya indirilirken bir hata oluştu.');
        }
    }

    // YENİ: Tamamen Ücretsiz Javascript Tabanlı Toplu İndirme
    async function downloadAllAsZip() {
        // Sayfadaki tüm medya elementlerini bul (sadece "media-file" class'ına sahip olanlar)
        const mediaElements = document.querySelectorAll('.media-file');
        const urls = Array.from(mediaElements).map(el => el.getAttribute('data-url'));

        if (urls.length === 0) {
            alert("İndirilecek fotoğraf veya video bulunamadı.");
            return;
        }

        const overlay = document.getElementById('loading-overlay');
        const progressText = document.getElementById('loading-progress');
        const statusText = document.getElementById('loading-text');

        // Yükleme ekranını göster
        overlay.style.display = 'flex';
        statusText.innerText = "Tüm dosyalar indiriliyor ve zipleniyor... Lütfen bekleyin.";

        try {
            const zip = new JSZip();
            const folder = zip.folder("dugun_albumu"); // Zip içindeki klasör adı

            let count = 0;

            // Tüm linkleri dolaş ve dosyaları indirip zip'in içine at
            for (const url of urls) {
                try {
                    const urlParts = url.split('/');
                    const filename = urlParts[urlParts.length - 1] || `dosya_${count}.jpg`;

                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Dosya okunamadı");
                    const blob = await response.blob();

                    // Dosyayı zip klasörüne ekle
                    folder.file(filename, blob);

                    count++;
                    progressText.innerText = `${count} / ${urls.length} dosya hazırlandı...`;
                } catch (err) {
                    console.error("Dosya atlandı:", url, err);
                }
            }

            statusText.innerText = "Zip dosyası oluşturuluyor, bu işlem biraz sürebilir...";
            progressText.innerText = "";

            // Zip dosyasını oluştur (Sıkıştırma işlemi başlar)
            const zipContent = await zip.generateAsync({ type: "blob" });

            // Oluşturulan zip dosyasını kullanıcının bilgisayarına indir
            const link = document.createElement('a');
            link.href = URL.createObjectURL(zipContent);
            link.download = "dugun_albumu_tum_arsiv.zip";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // Başarılı olursa ekranı kapat
            overlay.style.display = 'none';

        } catch (error) {
            console.error("Zip oluşturma hatası:", error);
            alert("Arşiv oluşturulurken bir hata oluştu.");
            overlay.style.display = 'none';
        }
    }
</script>

</body>
</html>
